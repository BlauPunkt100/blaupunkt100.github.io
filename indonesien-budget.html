<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Budget 🇮🇩">
  <title>Budget 🇮🇩</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, 'Inter', 'Helvetica Neue', sans-serif;
      background: #0F1A1C;
      color: #E8E0D5;
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom);
    }
    input, select, button { font-family: inherit; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); }

    #header {
      background: linear-gradient(135deg, #1A2E32 0%, #0F1A1C 100%);
      border-bottom: 1px solid #1E3035;
      padding: 48px 20px 16px;
    }
    .header-label { font-size: 11px; letter-spacing: 0.15em; color: #4E9FA3; text-transform: uppercase; margin-bottom: 4px; }
    .header-title { font-size: 22px; font-weight: 700; letter-spacing: -0.03em; color: #F0EAE0; }
    .header-chips { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
    .chip { background: #1A2E32; border: 1px solid #2A4A50; border-radius: 8px; padding: 5px 12px; }
    .chip-label { font-size: 10px; color: #4E9FA3; text-transform: uppercase; letter-spacing: 0.08em; }
    .chip-value { font-size: 14px; font-weight: 700; color: #F0EAE0; }

    #main { padding: 16px 20px; max-width: 480px; margin: 0 auto; }

    .card { border-radius: 12px; padding: 14px 16px; margin-bottom: 14px; }
    .card-dark { background: #142024; border: 1px solid #1E3035; }

    /* Day card */
    #day-card { border-radius: 12px; padding: 14px 16px; margin-bottom: 14px; transition: background 0.3s, border-color 0.3s; }
    .day-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
    .day-label { font-size: 11px; color: #6B8A8E; text-transform: uppercase; letter-spacing: 0.08em; }
    .day-limit { font-size: 12px; color: #6B8A8E; }
    .day-mid { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
    #day-amount { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; }
    #day-status { font-size: 13px; color: #6B8A8E; }
    #day-bar-wrap { height: 6px; background: #0F1A1C; border-radius: 3px; overflow: hidden; }
    #day-bar { height: 100%; border-radius: 3px; transition: width 0.4s ease, background 0.3s; }

    /* Two col */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .stat-card { background: #142024; border: 1px solid #1E3035; border-radius: 10px; padding: 12px 14px; }
    .stat-label { font-size: 10px; color: #6B8A8E; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
    .stat-value { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
    .stat-bar-wrap { margin-top: 6px; height: 4px; background: #1E3035; border-radius: 2px; overflow: hidden; }
    .stat-bar { height: 100%; background: linear-gradient(90deg, #4E9FA3, #2A7A7E); border-radius: 2px; transition: width 0.4s; }
    .stat-sub { font-size: 10px; color: #4A6A6E; margin-top: 4px; }

    /* Form */
    .section-label { font-size: 11px; color: #6B8A8E; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
    .currency-toggle { display: flex; gap: 6px; margin-bottom: 10px; }
    .cur-btn { flex: 1; padding: 8px 0; border-radius: 8px; border: none; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .cur-btn.active { background: #4E9FA3; color: #0F1A1C; font-weight: 700; }
    .cur-btn.inactive { background: #0F1A1C; color: #6B8A8E; font-weight: 400; }
    .two-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    .input-wrap { position: relative; }
    .input-cur-tag { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 11px; color: #4E9FA3; font-weight: 600; pointer-events: none; }
    input[type="date"], input[type="number"], input[type="text"], select {
      background: #0F1A1C; border: 1px solid #1E3035; border-radius: 8px;
      color: #E8E0D5; font-size: 13px; padding: 8px 10px; width: 100%; outline: none;
    }
    input[type="number"] { padding-right: 40px; }
    select { appearance: none; }
    .preview-box { background: #0F1A1C; border-radius: 8px; padding: 7px 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    .preview-label { font-size: 11px; color: #4A6A6E; }
    .preview-value { font-size: 12px; color: #4E9FA3; font-weight: 600; }
    .note-row { display: flex; gap: 8px; }
    .note-row input { flex: 1; }
    .add-btn { background: #4E9FA3; color: #0F1A1C; border: none; border-radius: 8px; padding: 0 20px; font-size: 20px; font-weight: 700; cursor: pointer; height: 38px; }

    /* Categories */
    .cat-row { margin-bottom: 8px; }
    .cat-top { display: flex; justify-content: space-between; margin-bottom: 3px; }
    .cat-name { font-size: 12px; }
    .cat-amt { font-size: 12px; color: #A0B8BC; }
    .cat-idr { font-size: 10px; color: #4A6A6E; }
    .cat-bar-wrap { height: 4px; background: #1E3035; border-radius: 2px; }
    .cat-bar { height: 100%; border-radius: 2px; transition: width 0.4s; }

    /* History */
    #history-toggle { width: 100%; background: #142024; border: 1px solid #1E3035; border-radius: 10px; padding: 10px 14px; color: #6B8A8E; font-size: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    #history-list { background: #142024; border: 1px solid #1E3035; border-top: none; border-radius: 0 0 10px 10px; max-height: 340px; overflow-y: auto; display: none; }
    .day-group { border-bottom: 1px solid #1A2E32; }
    .day-group-header { padding: 8px 14px 4px; display: flex; justify-content: space-between; align-items: center; }
    .day-group-date { font-size: 11px; color: #4E9FA3; font-weight: 600; }
    .day-group-total { font-size: 12px; font-weight: 700; }
    .entry-row { padding: 4px 14px; display: flex; justify-content: space-between; align-items: center; }
    .entry-label { font-size: 12px; color: #7A9EA2; }
    .entry-right { display: flex; align-items: center; gap: 8px; }
    .entry-orig { font-size: 11px; color: #4A6A6E; }
    .entry-eur { font-size: 11px; color: #A0B8BC; }
    .del-btn { background: none; border: none; color: #503020; cursor: pointer; font-size: 16px; line-height: 1; padding: 0 2px; }
    .empty-hint { padding: 20px; text-align: center; color: #4A6A6E; font-size: 13px; }
    .spacer { height: 32px; }
  </style>
</head>
<body>

<div id="header">
  <div class="header-label">Indonesien Backpacking</div>
  <div class="header-title">Budget Tracker</div>
  <div class="header-chips">
    <div class="chip"><div class="chip-label">Gesamt</div><div class="chip-value">4.000€</div></div>
    <div class="chip"><div class="chip-label">Tageslimit</div><div class="chip-value">50€ / Tag</div></div>
    <div class="chip"><div class="chip-label">Reisetag</div><div class="chip-value" id="trip-day-chip">–</div></div>
  </div>
</div>

<div id="main">

  <!-- Day card -->
  <div id="day-card">
    <div class="day-top">
      <span class="day-label">Heute</span>
      <span class="day-limit">Limit: 50€ / Tag</span>
    </div>
    <div class="day-mid">
      <span id="day-amount">0.00€</span>
      <span id="day-status">noch 50.00€ übrig</span>
    </div>
    <div id="day-bar-wrap"><div id="day-bar" style="width:0%"></div></div>
  </div>

  <!-- Totals -->
  <div class="two-col">
    <div class="stat-card">
      <div class="stat-label">Ausgegeben</div>
      <div class="stat-value" id="total-spent">0€</div>
      <div class="stat-bar-wrap"><div class="stat-bar" id="total-bar" style="width:0%"></div></div>
      <div class="stat-sub" id="total-pct">0.0% von 4.000€</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Noch übrig</div>
      <div class="stat-value" id="remaining">4000€</div>
      <div class="stat-sub" id="remaining-per-day">≈ 51€/Tag noch möglich</div>
      <div class="stat-sub" id="remaining-days">78 Tage verbleibend</div>
    </div>
  </div>

  <!-- Form -->
  <div class="card card-dark">
    <div class="section-label">Ausgabe erfassen</div>
    <div class="currency-toggle">
      <button class="cur-btn active" id="btn-idr" onclick="setCurrency('IDR')">🇮🇩 IDR (Rupiah)</button>
      <button class="cur-btn inactive" id="btn-eur" onclick="setCurrency('EUR')">🇪🇺 EUR (Euro)</button>
    </div>
    <div class="two-inputs">
      <input type="date" id="inp-date">
      <div class="input-wrap">
        <input type="number" id="inp-amount" placeholder="z.B. 50000" oninput="updatePreview()" onkeydown="if(event.key==='Enter') addEntry()">
        <span class="input-cur-tag" id="cur-tag">IDR</span>
      </div>
    </div>
    <div class="preview-box" id="preview-box" style="display:none">
      <span class="preview-label">Umrechnung:</span>
      <span class="preview-value" id="preview-text"></span>
    </div>
    <select id="inp-cat" style="margin-bottom:8px">
      <option>🏨 Unterkunft</option>
      <option selected>🍜 Essen</option>
      <option>🚌 Transport</option>
      <option>🎟️ Aktivitäten</option>
      <option>🛒 Sonstiges</option>
    </select>
    <div class="note-row">
      <input type="text" id="inp-note" placeholder="Notiz (optional)" onkeydown="if(event.key==='Enter') addEntry()">
      <button class="add-btn" onclick="addEntry()">+</button>
    </div>
  </div>

  <!-- Categories -->
  <div class="card card-dark">
    <div class="section-label">Nach Kategorie</div>
    <div id="cat-list"></div>
  </div>

  <!-- History -->
  <button id="history-toggle" onclick="toggleHistory()">
    <span id="history-count">Verlauf (0 Einträge)</span>
    <span id="history-arrow">▼</span>
  </button>
  <div id="history-list"><div class="empty-hint">Noch keine Einträge</div></div>

  <div class="spacer"></div>
</div>

<script>
const TOTAL_BUDGET = 4000;
const DAILY_BUDGET = 50;
const TRIP_START = new Date("2026-06-22T00:00:00");
const TRIP_DAYS = 78;
const IDR_RATE = 20000;

const CAT_COLORS = {
  "🏨 Unterkunft": "#4E9FA3",
  "🍜 Essen": "#E8845A",
  "🚌 Transport": "#7B68C8",
  "🎟️ Aktivitäten": "#5BAA72",
  "🛒 Sonstiges": "#C4A84F",
};

let entries = [];
let currency = "IDR";

function todayStr() {
  const d = new Date();
  return d.toISOString().slice(0, 10);
}

function fmtIDR(idr) {
  if (idr >= 1000000) return (idr / 1000000).toFixed(1) + "Jt";
  if (idr >= 1000) return (idr / 1000).toFixed(0) + "k";
  return idr.toString();
}

function formatDate(s) {
  const d = new Date(s + "T00:00:00");
  return d.toLocaleDateString("de-DE", { day: "2-digit", month: "short" });
}

function getTripDay(s) {
  const d = new Date(s + "T00:00:00");
  const diff = Math.floor((d - TRIP_START) / 86400000) + 1;
  return (diff > 0 && diff <= TRIP_DAYS) ? diff : null;
}

function save() {
  localStorage.setItem("id_budget_entries", JSON.stringify(entries));
}

function load() {
  try { entries = JSON.parse(localStorage.getItem("id_budget_entries") || "[]"); }
  catch { entries = []; }
}

function setCurrency(c) {
  currency = c;
  document.getElementById("btn-idr").className = "cur-btn " + (c === "IDR" ? "active" : "inactive");
  document.getElementById("btn-eur").className = "cur-btn " + (c === "EUR" ? "active" : "inactive");
  document.getElementById("cur-tag").textContent = c;
  document.getElementById("inp-amount").placeholder = c === "IDR" ? "z.B. 50000" : "z.B. 2.50";
  updatePreview();
}

function updatePreview() {
  const raw = parseFloat(document.getElementById("inp-amount").value);
  const box = document.getElementById("preview-box");
  if (!raw || raw <= 0) { box.style.display = "none"; return; }
  const eur = currency === "IDR" ? raw / IDR_RATE : raw;
  const idr = currency === "IDR" ? raw : raw * IDR_RATE;
  document.getElementById("preview-text").textContent = eur.toFixed(2) + "€ = " + fmtIDR(idr) + " IDR";
  box.style.display = "flex";
}

function addEntry() {
  const raw = parseFloat(document.getElementById("inp-amount").value);
  if (!raw || raw <= 0) return;
  const date = document.getElementById("inp-date").value || todayStr();
  const cat = document.getElementById("inp-cat").value;
  const note = document.getElementById("inp-note").value.trim();
  const amountEUR = currency === "IDR" ? raw / IDR_RATE : raw;
  const amountIDR = currency === "IDR" ? raw : raw * IDR_RATE;
  entries.unshift({ id: Date.now(), date, amountEUR, amountIDR, inputCurrency: currency, category: cat, note });
  save();
  document.getElementById("inp-amount").value = "";
  document.getElementById("inp-note").value = "";
  document.getElementById("preview-box").style.display = "none";
  render();
}

function removeEntry(id) {
  entries = entries.filter(e => e.id !== id);
  save();
  render();
}

function toggleHistory() {
  const list = document.getElementById("history-list");
  const arrow = document.getElementById("history-arrow");
  const open = list.style.display === "block";
  list.style.display = open ? "none" : "block";
  arrow.textContent = open ? "▼" : "▲";
}

function render() {
  const today = new Date();
  const daysElapsed = Math.max(1, Math.min(Math.floor((today - TRIP_START) / 86400000) + 1, TRIP_DAYS));
  document.getElementById("trip-day-chip").textContent = daysElapsed + " / " + TRIP_DAYS;

  const todayStr_ = todayStr();
  const todaySpent = entries.filter(e => e.date === todayStr_).reduce((s, e) => s + e.amountEUR, 0);
  const totalSpent = entries.reduce((s, e) => s + e.amountEUR, 0);
  const remaining = TOTAL_BUDGET - totalSpent;

  // Day card
  const dayOver = todaySpent > DAILY_BUDGET;
  const dayPct = Math.min((todaySpent / DAILY_BUDGET) * 100, 100);
  const dc = document.getElementById("day-card");
  dc.style.background = dayOver ? "linear-gradient(135deg,#332218,#281A10)" : "linear-gradient(135deg,#1A3328,#152820)";
  dc.style.border = "1px solid " + (dayOver ? "#50301A" : "#2A5040");
  const dayAmtEl = document.getElementById("day-amount");
  dayAmtEl.textContent = todaySpent.toFixed(2) + "€";
  dayAmtEl.style.color = dayOver ? "#E8845A" : "#5BAA72";
  document.getElementById("day-status").textContent = dayOver
    ? "+" + (todaySpent - DAILY_BUDGET).toFixed(2) + "€ über Limit"
    : "noch " + (DAILY_BUDGET - todaySpent).toFixed(2) + "€ übrig";
  const bar = document.getElementById("day-bar");
  bar.style.width = dayPct + "%";
  bar.style.background = dayOver ? "linear-gradient(90deg,#8B3A20,#E8845A)" : "linear-gradient(90deg,#2A6048,#5BAA72)";

  // Totals
  const progressPct = Math.min((totalSpent / TOTAL_BUDGET) * 100, 100);
  document.getElementById("total-spent").textContent = totalSpent.toFixed(0) + "€";
  document.getElementById("total-bar").style.width = progressPct + "%";
  document.getElementById("total-pct").textContent = progressPct.toFixed(1) + "% von 4.000€";

  const remEl = document.getElementById("remaining");
  remEl.textContent = remaining.toFixed(0) + "€";
  remEl.style.color = remaining > 0 ? "#4E9FA3" : "#E8845A";

  // Use selected form date for remaining days calc
  const formDate = document.getElementById("inp-date").value || todayStr_;
  const formDayNum = Math.floor((new Date(formDate + "T00:00:00") - TRIP_START) / 86400000);
  const daysLeft = Math.max(TRIP_DAYS - formDayNum, 0);
  document.getElementById("remaining-per-day").textContent = "≈ " + (remaining / Math.max(daysLeft, 1)).toFixed(0) + "€/Tag noch möglich";
  document.getElementById("remaining-days").textContent = daysLeft + " Tage verbleibend";

  // Categories
  const catTotals = {};
  entries.forEach(e => { catTotals[e.category] = (catTotals[e.category] || 0) + e.amountEUR; });
  const catOrder = ["🏨 Unterkunft", "🍜 Essen", "🚌 Transport", "🎟️ Aktivitäten", "🛒 Sonstiges"];
  const catHTML = catOrder.map(cat => {
    const amt = catTotals[cat] || 0;
    const pct = totalSpent > 0 ? (amt / totalSpent) * 100 : 0;
    return `<div class="cat-row">
      <div class="cat-top">
        <span class="cat-name">${cat}</span>
        <span class="cat-amt">${amt.toFixed(2)}€ <span class="cat-idr">(${fmtIDR(amt * IDR_RATE)} IDR)</span></span>
      </div>
      <div class="cat-bar-wrap"><div class="cat-bar" style="width:${pct}%;background:${CAT_COLORS[cat]}"></div></div>
    </div>`;
  }).join("");
  document.getElementById("cat-list").innerHTML = catHTML;

  // History
  const byDay = {};
  entries.forEach(e => { if (!byDay[e.date]) byDay[e.date] = []; byDay[e.date].push(e); });
  const days = Object.keys(byDay).sort((a, b) => b.localeCompare(a));
  document.getElementById("history-count").textContent = "Verlauf (" + entries.length + " Einträge)";

  if (days.length === 0) {
    document.getElementById("history-list").innerHTML = '<div class="empty-hint">Noch keine Einträge</div>';
    return;
  }

  const histHTML = days.map(date => {
    const dayEnts = byDay[date];
    const dayTotal = dayEnts.reduce((s, e) => s + e.amountEUR, 0);
    const tripDay = getTripDay(date);
    const color = dayTotal <= DAILY_BUDGET ? "#5BAA72" : "#E8845A";
    const rows = dayEnts.map(e => `
      <div class="entry-row">
        <span class="entry-label">${e.category}${e.note ? " · " + e.note : ""}</span>
        <div class="entry-right">
          <span class="entry-orig">${e.inputCurrency === "IDR" ? fmtIDR(e.amountIDR) + " IDR" : e.amountEUR.toFixed(2) + "€"}</span>
          <span class="entry-eur">= ${e.amountEUR.toFixed(2)}€</span>
          <button class="del-btn" onclick="removeEntry(${e.id})">×</button>
        </div>
      </div>`).join("");
    return `<div class="day-group">
      <div class="day-group-header">
        <span class="day-group-date">${formatDate(date)}${tripDay ? " · Tag " + tripDay : ""}</span>
        <span class="day-group-total" style="color:${color}">${dayTotal.toFixed(2)}€</span>
      </div>${rows}</div>`;
  }).join("");
  document.getElementById("history-list").innerHTML = histHTML;
}

// Init
load();
document.getElementById("inp-date").value = todayStr();
document.getElementById("inp-date").addEventListener("change", render);
render();
</script>
</body>
</html>
